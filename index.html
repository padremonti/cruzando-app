    function playNotes(freqs) {
      try {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        freqs.forEach((f, i) => {
          setTimeout(() => {
            const o = ac.createOscillator();
            const g = ac.createGain();
            o.type = "sine";
            o.frequency.value = f;
            g.gain.setValueAtTime(0.07, ac.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
            o.connect(g);
            g.connect(ac.destination);
            o.start();
            o.stop(ac.currentTime + 0.3);
          }, i * 180);
        });
      } catch (e) {}
    }

“contemplacion”: “El único reino que no tendrá fin\nEl Reino de Dios es el único reino que no tendrá fin. Ningún rey, emperador o gobernante de la historia recibió la máxima corona de gloria.\n¿Quién la recibió? La Mujer humilde y creyente que nos dio al Mesías.\nMaría, la joven de Nazaret. La refugiada en Egipto. La madre dolorosa al pie de la Cruz. La orante silenciosa en Pentecostés. Ella es coronada Reina del cielo y de la tierra.\nNo por sus logros políticos. No por su poder militar. No por su riqueza. Por su fe. Por su sí. Por su humildad.\nDios invierte todas las lógicas del mundo. Los últimos son primeros. Los humildes son exaltados. Los pequeños son grandes en el Reino.\nY María, coronada Reina, nos enseña que la gloria definitiva no es para quienes acumulan poder terrenal, sino para quienes le dan la bienvenida al amor de Dios con corazón sencillo.\n¿Qué personas merecen homenaje y honor, pero nadie se los da? Dios los ve. Y en el Reino, ellos brillarán más que todos los poderosos de la tierra.”,
