    function playNotes(freqs) {
      try {
        const ac = new (window.AudioContext || window.webkitAudioContext)();
        freqs.forEach((f, i) => {
          setTimeout(() => {
            const o = ac.createOscillator();
            const g = ac.createGain();
            o.type = "sine";
            o.frequency.value = f;
            g.gain.setValueAtTime(0.07, ac.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
            o.connect(g);
            g.connect(ac.destination);
            o.start();
            o.stop(ac.currentTime + 0.3);
          }, i * 180);
        });
      } catch (e) {}
    }

    function AudioPlayer({ src, label, T }) {
      const ref = useRef(null);
      const [playing, setPlaying] = useState(false);
      const [time, setTime] = useState(0);
      const [dur, setDur] = useState(0);
      const [error, setError] = useState(null);

      useEffect(() => {
        if (!ref.current) return;
        playing ? ref.current.play().catch(err => {
          console.error('Error reproduciendo:', err);
          setError('No se pudo reproducir');
          setPlaying(false);
        }) : ref.current.pause();
      }, [playing]);

      const fmt = s => Math.floor(s / 60) + ":" + String(Math.floor(s % 60)).padStart(2, "0");

      if (!src) return (
        <div style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",background:T.secBg,borderRadius:12}}>

          </div>
          <div>
            <div style={{fontSize:16,fontWeight:500,color:T.textSoft}}>{label}</div>
            <div style={{fontSize:14,color:T.textDim,marginTop:2}}>Audio próximamente</div>
          </div>
        </div>
      );

      return (
        <div style={{padding:"12px 16px",background:T.secBg,borderRadius:12}}>
          <audio ref={ref} src={src}
            onTimeUpdate={() => setTime(ref.current.currentTime)}
            onLoadedMetadata={() => {
              setDur(ref.current.duration);
              setError(null);
            }}
            onEnded={() => setPlaying(false)}
            onError={(e) => {
              console.error('Error cargando audio:', src, e);
              setError('Error al cargar el archivo');
              setPlaying(false);
            }}
          />

            </div>
          </div>
        </div>
      );

              "¿Qué dolor has sentido al dejar atrás la infancia, la casa paterna, las costumbres de otra época? ¿Cómo estás cruzando el duelo de crecer, de madurar, de tomar tus propias decisiones?"
            ],
            intercesion: "Jesús, tú que creciste ocupándote de las cosas de tu Padre, ayúdame a aceptar que crecer duele, pero es voluntad de Dios. Enséñame a soltar lo que ya no me corresponde cargar, y a confiar que mi camino, aunque duela, es el que Tú preparaste para mí.\nAmén.",
            audioContemplacion: "https://pub-cd28789360f74fc0a623bb76605f42c3.r2.dev/1_1_5.mp3"
          }
        ]
      };

      const [ci, setCi] = useState(0);
      const [done, setDone] = useState({});
      const [journal, setJournal] = useState({});
      const [showPray, setShowPray] = useState(false);
      const [celeb, setCeleb] = useState(null);
      const [trans, setTrans] = useState(false);

      const m = cuaderno.misterios[ci];
      const isDone = ci in done;
      const total = cuaderno.misterios.length;
      const doneCount = Object.keys(done).length;

      const goTo = i => {
        if (i < 0 || i >= total) return;
        setTrans(true);
        setTimeout(() => {
          setCi(i);
          setOpenSections({}); // Cierra todas las secciones al cambiar de misterio
          setShowPray(false);
          setTrans(false);
          window.scrollTo(0,0);
        }, 250);
      };

      const complete = () => {
        setDone(p => ({...p, [ci]: Date.now()}));
        setCeleb(ci);
        setShowPray(false);
        if (ci === total - 1) {
          setTimeout(() => setCeleb("grand"), 2500);
        } else {
          setTimeout(() => goTo(ci + 1), 2500);
        }
      };

      return (
        <>
          <style>{CSS(T)}</style>
          {celeb === "grand" && <GrandCeleb onDone={() => setCeleb(null)} />}
          {celeb !== null && celeb !== "grand" && <CelebOverlay variant={celeb} onDone={() => setCeleb(null)} />}

          <div style={{minHeight:"100vh",background:T.bg,paddingBottom:40}}>
            <div style={{padding:"20px 18px 16px",background:T.card,borderBottom:"1.5px solid "+T.border}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{flex:1}}>
                  <div style={{display:"inline-block",background:LVL.bold,color:"#fff",padding:"4px 12px",borderRadius:16,fontSize:12,fontWeight:600,letterSpacing:0.8,textTransform:"uppercase",marginBottom:8}}>
                    Nivel Cruz
                  </div>
                  <h1 style={{fontSize:26,fontWeight:700,color:T.text,marginBottom:4}}>{cuaderno.nombre}</h1>
                  <div style={{fontSize:16,color:T.textSoft,fontStyle:"italic"}}>{cuaderno.subtitulo}</div>
                </div>
                <button 
                  onClick={() => setDarkMode(!darkMode)} 
                  style={{
                    width:40,
                    height:40,
                    borderRadius:"50%",
                    background:T.secBg,
                    border:"1.5px solid "+T.border,
                    cursor:"pointer",
                    display:"flex",
                    alignItems:"center",
                    justifyContent:"center",
                    flexShrink:0,
                    transition:"all 0.2s"
                  }}
                  title={darkMode ? "Modo claro" : "Modo oscuro"}
                >
                  {darkMode ? (
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={T.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                  ) : (
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={T.text} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                  )}
                </button>
              </div>
            </div>

            <div style={{padding:"16px 18px",background:T.card,borderBottom:"1px solid "+T.border}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                {cuaderno.misterios.map((_, i) => {
                  const isA = i === ci;
                  const isD = i in done;
                  const gap = i % 5 === 0 && i !== 0;
                  return (
                    <div key={i} style={{display:"flex",alignItems:"center"}}>
                      {gap && <div style={{width:8}} />}
                      <div onClick={() => goTo(i)} style={{width:isA?24:11,height:11,borderRadius:6,background:isD?GREEN:isA?LVL.bold:T.border,cursor:"pointer",transition:"all 0.3s",boxShadow:isA?"0 0 0 3px "+LVL.light:isD?"0 0 6px "+GREEN+"60":"none"}} />
                    </div>
                  );
                })}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontSize:13,color:T.textDim}}>Misterios Gozosos {"·"} <em style={{color:LVL.soft}}>{cuaderno.subtitulo}</em></span>
                <span style={{fontSize:13,fontWeight:700,color:doneCount===total?GREEN:LVL.bold}}>{doneCount}/{total}</span>
              </div>
            </div>

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"0 18px 8px"}}>
              <button onClick={() => goTo(ci-1)} disabled={ci===0} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",cursor:ci===0?"default":"pointer",opacity:ci===0?0.3:1,color:T.textSoft,fontSize:13,fontFamily:"Inter,sans-serif"}}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.textSoft} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15,18 9,12 15,6"/></svg> Anterior
              </button>
              <span style={{fontSize:13,fontWeight:600,color:T.textDim}}>{ci+1} de {total}</span>
              <button onClick={() => goTo(ci+1)} disabled={ci===total-1} style={{display:"flex",alignItems:"center",gap:4,background:"none",border:"none",cursor:ci===total-1?"default":"pointer",opacity:ci===total-1?0.3:1,color:T.textSoft,fontSize:13,fontFamily:"Inter,sans-serif"}}>
                Siguiente <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={T.textSoft} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9,6 15,12 9,18"/></svg>
              </button>
            </div>

            <div style={{padding:"4px 14px 120px",opacity:trans?0:1,transform:trans?"translateY(6px)":"none",transition:"all 0.25s"}}>
              <div style={{borderRadius:18,overflow:"hidden",marginBottom:14,position:"relative",background:"linear-gradient(135deg,"+LVL.light+","+LVL.mist+","+LVL.soft+")",height:170}}>
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",justifyContent:"flex-end",padding:"18px 20px",background:"linear-gradient(to top,rgba(43,38,34,0.75) 0%,rgba(43,38,34,0.15) 60%,transparent 100%)"}}>
                  <div style={{fontSize:13,fontWeight:600,letterSpacing:1,color:LVL.light,textTransform:"uppercase"}}>{ORDS[ci%5]} Misterio Gozoso</div>
                  <h2 style={{margin:"3px 0 0",fontSize:24,fontWeight:700,color:"#fff",lineHeight:1.2}}>{m.nombre}</h2>
                  <div style={{fontSize:16,color:"rgba(255,255,255,0.85)",fontStyle:"italic",marginTop:4}}>{m.subtitulo}</div>
                </div>
              </div>

              <div style={{padding:"16px 18px",background:T.card,borderRadius:16,border:"1.5px solid "+T.border,marginBottom:10}}>
                <div style={{fontSize:13,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:LVL.bold,marginBottom:10}}>{"📖"} Evangelio</div>
                <div style={{fontSize:18,color:T.text,lineHeight:1.8,whiteSpace:"pre-line"}}>{m.evangelio.text}</div>
                <div style={{fontSize:14,color:T.textDim,marginTop:12,textAlign:"right",fontStyle:"italic"}}>{"—"} {m.evangelio.ref}</div>
              </div>

              <Sec icon={ICON_ROSARY} title="Rezar este Misterio" T={T} open={openSections.rezar} onToggle={() => toggleSection('rezar')}>
                <AudioPlayer src={cuaderno.audioRezo} label="Padrenuestro + 10 Avemarías + Gloria" T={T} />
              </Sec>

              <Sec icon={ICON_MUSIC} title="Canto" T={T} open={openSections.canto} onToggle={() => toggleSection('canto')}>
                <AudioPlayer src={cuaderno.audioCanto} label="Ave María — Jacob Arcadelt — Coro Laus Deo (Aguascalientes, 2026)" T={T} />
              </Sec>

              <Sec icon={ICON_EYE} title="Contemplar" T={T} open={openSections.contemplar} onToggle={() => toggleSection('contemplar')}>
                <AudioPlayer src={m.audioContemplacion} label="Audio de la contemplación" T={T} />
                <div style={{marginTop:14,padding:"16px 18px",background:T.secBg,borderRadius:14,borderLeft:"3px solid "+LVL.soft}}>
                  <div style={{fontSize:18,color:T.text,lineHeight:1.85,whiteSpace:"pre-line"}}>{m.contemplacion}</div>
                </div>
              </Sec>

              <Sec icon={ICON_PEN} title="Meditar y escribir" T={T} open={openSections.meditar} onToggle={() => toggleSection('meditar')}>
                <div style={{display:"flex",flexDirection:"column",gap:20}}>
                  {m.meditacion.map((q, qi) => (
                    <div key={qi}>
                      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}>
                        <div style={{width:7,height:7,borderRadius:4,background:MCOLORS[qi]}} />
                        <span style={{fontSize:13,fontWeight:600,letterSpacing:1,textTransform:"uppercase",color:MCOLORS[qi]}}>{MLABELS[qi]}</span>
                      </div>
                      <p style={{fontSize:18,color:T.text,lineHeight:1.7,marginBottom:10}}>{q}</p>
                      <textarea
                        value={journal[ci]?.[qi] || ""}
                        onChange={e => setJournal(p => ({...p, [ci]: {...(p[ci]||{}), [qi]: e.target.value}}))}
                        placeholder="Escribe aquí tu reflexión..."
                        rows={3}
                        style={{width:"100%",padding:"12px 16px",background:T.inputBg,border:"1.5px solid "+T.border,borderRadius:12,color:T.text,fontSize:17,lineHeight:1.7,resize:"vertical",outline:"none",transition:"border 0.2s"}}
                        onFocus={e => e.target.style.borderColor = LVL.soft}
                        onBlur={e => e.target.style.borderColor = T.border}
                      />
                    </div>
                  ))}
                </div>
              </Sec>

              {!showPray && !isDone && (
                <button onClick={() => setShowPray(true)} style={{width:"100%",padding:"16px",marginTop:8,background:T.card,border:"1.5px solid "+LVL.light,borderRadius:16,cursor:"pointer",fontSize:17,fontWeight:600,fontFamily:"Inter,sans-serif",color:LVL.bold,display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                  {"🙏"} Oración de intercesión
                </button>
              )}

              {showPray && !isDone && (
                <div style={{marginTop:10,padding:"22px",background:T.card,borderRadius:18,border:"1.5px solid "+LVL.soft,boxShadow:"0 4px 24px rgba(255,122,0,0.1)",animation:"sU 0.4s ease"}}>
                  <div style={{fontSize:13,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase",color:LVL.bold,marginBottom:12}}>{"🙏"} Intercesión</div>
                  <p style={{fontSize:19,color:T.text,lineHeight:1.85,fontStyle:"italic",whiteSpace:"pre-line"}}>{m.intercesion}</p>
                  <button onClick={complete} style={{width:"100%",marginTop:20,padding:"16px",background:LVL.bold,border:"none",borderRadius:14,cursor:"pointer",color:"#fff",fontSize:18,fontWeight:700,fontFamily:"Inter,sans-serif",boxShadow:"0 4px 16px rgba(255,122,0,0.3)"}}>
                    {ci < total - 1 ? "Siguiente Misterio →" : "Completar Cuaderno ✦"}
                  </button>
                </div>
              )}

              {isDone && (
                <div style={{marginTop:10,padding:"16px 20px",background:GREEN+"15",borderRadius:16,border:"1.5px solid "+GREEN+"30",display:"flex",alignItems:"center",gap:12,animation:"sU 0.4s ease"}}>
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={GREEN} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="4,12 10,18 20,6"/></svg>
                  <div>
                    <div style={{fontSize:17,fontWeight:600,color:GREEN}}>Misterio completado</div>
                    <div style={{fontSize:14,color:T.textDim,marginTop:2}}>{new Date(done[ci]).toLocaleDateString("es-MX",{day:"numeric",month:"long"})}</div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </>
      );
    }

    function CSS(T) {
      return `
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif}
        body{margin:0;background:${T.bg};font-family:'Inter',sans-serif}
        textarea{font-family:'Inter',sans-serif}
        button{font-family:'Inter',sans-serif}
        ::placeholder{color:${T.textDim}}
        ::-webkit-scrollbar{width:3px}
        ::-webkit-scrollbar-thumb{background:${T.border};border-radius:2px}
        @keyframes sU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        @keyframes haloX{0%{transform:scale(0.3);opacity:0}30%{opacity:1}100%{transform:scale(2.5);opacity:0}}
        @keyframes riseL{0%{transform:translateY(0);opacity:0}20%{opacity:0.8}100%{transform:translateY(-200px);opacity:0}}
        @keyframes crossG{0%{opacity:0;transform:scale(0.5)}40%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(1.3)}}
        @keyframes fDot{0%{transform:scale(0) translateY(20px);opacity:0}30%{opacity:0.9;transform:scale(1.2) translateY(0)}100%{transform:scale(0) translateY(-40px);opacity:0}}
        @keyframes gPulse{0%{transform:scale(0)}30%{transform:scale(1.1)}50%{transform:scale(0.95)}100%{transform:scale(1);opacity:0}}
        @keyframes rayB{0%{height:0;opacity:0}30%{opacity:0.7}100%{height:100px;opacity:0}}
        @keyframes gScale{0%{transform:scale(0)}40%{transform:scale(1.2)}60%{transform:scale(0.9)}100%{transform:scale(1)}}
      `;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
